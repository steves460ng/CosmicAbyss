            ],
            consequences: [
                "자아 붕괴", "물리법칙 반전", "과거의 소멸", "신체의 증식", "현실의 가상화", "기억의 환전", "감각의 전이", "공간의 압축", "타자의 빙의", "인과의 단절",
                "영혼의 침식", "존재의 망각", "의식의 공유", "시간의 파편화", "죽음의 거부", "공포의 구체화", "신성 모독", "영원한 회귀", "지식의 저주", "생명의 기계화",
                "피부의 경질화", "시각의 상실", "청각의 시각화", "내장의 이탈", "뼈의 재배치", "유전자 변이", "타차원 전송", "그림자 잠식", "언어의 무력화", "이성의 증발",

            const generate = () => {
                const pick = (key) => {
                    const arr = KEYWORD_DATABASE[key];
                    return arr[Math.floor(Math.random() * arr.length)];
                };

                setResult({
                    persona: { adj: pick('adjectives'), id: pick('identities') },
                    event: { action: pick('actions'), obj: pick('objects') },
                    setting: { atmos: pick('atmospheres'), place: pick('places') },
                    anomaly: pick('anomalies'),
                    consequence: pick('consequences')
                });
            };

                if (!result) return;
                const text = `등장 인물: ${result.persona.adj} ${result.persona.id}\n사건 및 동기: ${result.event.obj}을(를) ${result.event.action}\n배경 및 장소: ${result.setting.atmos} ${result.setting.place}\n변칙 현상: ${result.anomaly}\n파멸의 대가: ${result.consequence}`;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            };

            useEffect(() => { generate(); }, []);

            return (

                        >
                            데이터 테이블

                                    <div className="grid grid-cols-1 gap-12">

                                        <Section label="배경 및 장소" value={`${result.setting.atmos} ${result.setting.place}`} />
                                        <Section label="변칙 현상" value={result.anomaly} />
                                        <Section label="파멸의 대가" value={result.consequence} />
                                    </div>
                                )}

                            <div className="flex gap-4">
                                <button 
                                    onClick={generate}
                                    className="flex-1 bg-white text-black font-black py-4 rounded-xl hover:bg-neutral-200 transition-colors uppercase tracking-tight shadow-xl shadow-purple-900/10"

                                    주사위 굴리기

                                >
                                    복사하기
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-16 pb-24">
                            {Object.entries(KEYWORD_DATABASE).map(([key, list]) => (
                                <div key={key}>
                                    <h3 className="text-white font-black mb-6 uppercase text-xs tracking-widest border-l-4 border-purple-800 pl-3 flex justify-between items-center">
                                        <span>{
                                            key === 'adjectives' ? '수식어' : 
                                            key === 'identities' ? '신분' : 
                                            key === 'actions' ? '행위' : 
                                            key === 'objects' ? '대상' : 
                                            key === 'atmospheres' ? '분위기' : 
                                            key === 'places' ? '장소' : 
                                            key === 'anomalies' ? '변칙 현상' : '파멸의 대가'
                                        }</span>
                                        <span className="text-neutral-700 mono text-[10px] bg-neutral-900 px-2 py-0.5 rounded">{list.length} Items</span>
                                    </h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-1.5">
                                        {list.map((item, idx) => (
                                            <div key={idx} className="bg-neutral-900/40 p-2.5 rounded-lg text-[11px] text-neutral-500 border border-neutral-800/50 hover:border-purple-900 hover:text-white transition-all group">
                                                <span className="mono mr-2 text-neutral-700 group-hover:text-purple-600 transition-colors">{(idx + 1).toString().padStart(2, '0')}</span>
                                                {item}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <footer className="mt-20 text-center opacity-30 mono text-[9px] uppercase tracking-[0.5em] pb-10">
                        In-Memory Database Matrix v1.1 / No Persistence Required
                    </footer>
                </div>
            );
        };

        const Section = ({ label, value }) => (
            <div className="group border-l border-neutral-800 pl-6 py-1 hover:border-purple-600 transition-colors duration-300">
                <span className="text-[10px] uppercase font-black tracking-[0.2em] text-neutral-600 block mb-2 group-hover:text-purple-500 transition-colors">{label}</span>
                <p className="text-xl md:text-2xl font-black text-neutral-100 group-hover:text-white transition-colors">
                    {value}
                </p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
