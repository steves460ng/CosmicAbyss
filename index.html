                                )}
                            </div>

                            <div className="flex gap-4">
                                <button 
                                    onClick={generate}
                                    className="flex-1 bg-white text-black font-black py-4 rounded-xl hover:bg-neutral-200 transition-colors uppercase tracking-tight"
                                >
                                    주사위 굴리기
                                </button>
                                <button 
                                    onClick={copyToClipboard}
                                    className="px-8 bg-neutral-800 text-white font-bold py-4 rounded-xl hover:bg-neutral-700 border border-neutral-700 transition-colors uppercase"
                                >
                                    복사하기
                                </button>
                            </div>
                        </div>
                    ) : (
                        <div className="space-y-12 pb-20">
                            {Object.entries(KEYWORD_DATABASE).map(([key, list]) => (
                                <div key={key}>
                                    <h3 className="text-white font-bold mb-4 uppercase text-sm border-b border-neutral-800 pb-2 flex justify-between">
                                        <span>{key === 'adjectives' ? '수식어' : key === 'identities' ? '신분' : key === 'actions' ? '행위' : key === 'objects' ? '대상' : key === 'atmospheres' ? '분위기' : key === 'places' ? '장소' : key === 'anomalies' ? '현상' : '결과'}</span>
                                        <span className="text-neutral-600 mono">{list.length}</span>
                                    </h3>
                                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-1">
                                        {list.map((item, idx) => (
                                            <div key={idx} className="bg-neutral-900/50 p-2 rounded text-[11px] text-neutral-500 border border-neutral-900 hover:border-neutral-700 hover:text-white transition-all">
                                                <span className="mono mr-2 text-neutral-700">{(idx + 1).toString().padStart(2, '0')}</span>
                                                {item}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    <footer className="mt-20 text-center opacity-20 mono text-[10px] uppercase tracking-widest">
                        Data storage: In-Memory / No persistence required
                    </footer>
                </div>
            );
        };

        const Section = ({ label, value }) => (
            <div className="group">
                <span className="text-[10px] uppercase font-black tracking-widest text-neutral-600 block mb-1 group-hover:text-purple-500 transition-colors">{label}</span>
                <p className="text-xl md:text-2xl font-bold text-white">
                    {value}
                </p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
